[Option]

; НЧЧр АњСЄ СЄКИ УтЗТ ПЉКЮ (default: No)
OutputInfo = Yes

; ЦФРЯ Л§МК ЙцНФ (default: No) 
; New 		- ЦФРЯИэ ЕкПЁ _NEWИІ КйПЉ ЛѕЗЮ РњРхЕШДй. 
; OverWrite 	- ААРК ЦФРЯПЁ ЕЄОю ОВБт
; No 		- ЦФРЯРЛ Л§МКЧЯСі ОЪДТДй. (*.i3s)
OutputFile = New

; ЕЕСпПЁ НЧЦаЧиЕЕ АшМг СјЧрЧвСі ПЉКЮ (default: No)
IgnoreRun = No

[i3OptBuildIndexedGeometry]

; IndexArrayИІ ИИЕщСі ПЉКЮ (default: No)
BuildIndex = No

[i3OptBuildTriStrip]

; СіПјЧЯДТ Primitive Type (default: I3G_PRIM_NONE)
; I3G_PRIM_TRILIST
; I3G_PRIM_TRISTRIP
TargetPrimType = I3G_PRIM_TRISTRIP

; TriangleStripРИЗЮ КЏШЏНУ VertexИІ ПЌАсЧвСі ПЉКЮ (default: Yes)
StitchStrips = Yes

; TriangleStripРИЗЮ КЏШЏНУ Л§МКЕЩМі РжДТ УжМв Vertex АЙМі 
; StitchStripsАЁ No РЯЖЇИИ (default: 0) 
MinStripSize = 0
