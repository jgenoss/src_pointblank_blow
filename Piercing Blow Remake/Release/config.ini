[ConnectServer]
; IP y puerto para conexiones de clientes
BindIP=0.0.0.0
BindPort=39190
MaxClientSessions=500
WorkerThreadCount=4
SocketTimeout=30

; Puerto para registro de GameServers
GameServerPort=39191

[DataServer]
; Conexion al DataServer para autenticacion
IP=127.0.0.1
Port=40100

[Security]
; Ruta de llaves RSA para handshake
RSAKeyPath=./keys/
; Timeout de sesion en segundos (cliente debe completar auth en este tiempo)
SessionTimeout=30

[Logging]
; Ruta de archivos de log
LogPath=./logs/
LogLevel=3
